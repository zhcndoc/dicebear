name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: dicebear/dicebear/.github/workflows/test.yml@9.x

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build -- --ignore "@dicebear/@(docs|editor)"

      - name: Determine dist tag
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" =~ -(alpha|beta|rc)\. ]]; then
            echo "DIST_TAG=next" >> $GITHUB_ENV
          else
            if [ -f .dist-tag ]; then
              echo "DIST_TAG=$(cat .dist-tag)" >> $GITHUB_ENV
            else
              echo "DIST_TAG=latest" >> $GITHUB_ENV
            fi
          fi

      - run: |
          ./node_modules/.bin/lerna publish from-package --dist-tag "$DIST_TAG" --ignore-scripts --yes
