name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  test:
    uses: dicebear/dicebear/.github/workflows/test.yml@9.x

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npx turbo run build --filter='!@dicebear/docs' --filter='!@dicebear/editor'

      - name: Determine dist tag
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" =~ -(alpha|beta|rc)\. ]]; then
            echo "DIST_TAG=next" >> $GITHUB_ENV
          else
            if [ -f .dist-tag ]; then
              echo "DIST_TAG=$(cat .dist-tag)" >> $GITHUB_ENV
            else
              echo "DIST_TAG=latest" >> $GITHUB_ENV
            fi
          fi

      - run: node scripts/publish.mjs "$DIST_TAG"
